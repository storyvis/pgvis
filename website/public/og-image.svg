<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="pgvis — Turn any Postgres database into MCP tools, a REST API and OpenAPI, from one Rust engine.">
  <defs>
    <linearGradient id="p" x1="14" y1="12" x2="28" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c79f1" />
      <stop offset="1" stop-color="#4f46e5" />
    </linearGradient>
    <radialGradient id="glow-violet" cx="1260" cy="60" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.18" />
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-cyan" cx="50" cy="580" r="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.14" />
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background + corner glows -->
  <rect width="1200" height="630" fill="#f5f2eb" />
  <rect width="1200" height="630" fill="url(#glow-violet)" />
  <rect width="1200" height="630" fill="url(#glow-cyan)" />

  <!-- Lockup: Prism mark + Geist 'pgvis' wordmark (inlined from lockup-brand.svg, scaled 2.95×) -->
  <g transform="translate(84 113) scale(2.95)">
    <g transform="translate(0 5)">
      <line x1="3" y1="24" x2="14" y2="24" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
      <path d="M 14 12 L 28 24 L 14 36 Z" fill="url(#p)" />
      <line x1="28" y1="24" x2="44" y2="14" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" />
      <line x1="28" y1="24" x2="45" y2="24" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" />
      <line x1="28" y1="24" x2="44" y2="34" stroke="#f472b6" stroke-width="2" stroke-linecap="round" />
    </g>
    <text
      x="52" y="41"
      font-family="Geist, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-weight="700"
      font-size="42"
      letter-spacing="-1.26"
    ><tspan fill="#0b0b14">pg</tspan><tspan fill="#4f46e5">vis</tspan></text>
  </g>

  <!-- Headline -->
  <text
    font-family="Geist, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="600"
    font-size="56"
    letter-spacing="-1.12"
    fill="#0b0b14"
  >
    <tspan x="84" y="334">Turn any Postgres database into</tspan>
    <tspan x="84" dy="67"><tspan fill="#4f46e5">MCP tools</tspan>, a <tspan fill="#8b5cf6">REST API</tspan> &amp; <tspan fill="#7c3aed">OpenAPI</tspan></tspan>
    <tspan x="84" dy="67">— from one Rust engine.</tspan>
  </text>

  <!-- URL -->
  <text
    x="84" y="537"
    font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace"
    font-weight="500"
    font-size="24"
    letter-spacing="0.96"
    fill="#64748b"
  >pgvis.io</text>
</svg>
