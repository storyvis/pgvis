    <path d="M20 28h40M20 40h40M20 52h25" stroke="white" stroke-width="5" stroke-linecap="round" />
  </g>
  <text x="200" y="158" font-family="Inter, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#f8fafc" letter-spacing="-1">pgvis</text>
  <text x="96" y="290" font-family="Inter, -apple-system, sans-serif" font-size="68" font-weight="800" fill="#f8fafc" letter-spacing="-2">Turn Postgres into</text>
