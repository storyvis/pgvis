      <stop offset="0" stop-color="#818cf8" />
      <stop offset="0.5" stop-color="#a78bfa" />
      <stop offset="1" stop-color="#c084fc" />
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
