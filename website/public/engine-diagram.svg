<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="pgvis introspects a Postgres or SQLite database and serves it three ways: as MCP tools, a REST API, and an OpenAPI 3.0 spec, through one parse, plan, SQL pipeline.">
  <defs>
    <linearGradient id="ed-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.55" />
    </linearGradient>
    <style>
      svg {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      /* Source / surface pills */
      .ed-pill rect {
        fill: #14142b;
        stroke: #2d2d5a;
        stroke-width: 1;
      }

      .ed-pill .ed-icon {
        fill: none;
        stroke-width: 1.6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .ed-label {
        font-size: 16px;
        font-weight: 600;
        dominant-baseline: middle;
        fill: #e2e8f0;
      }

      /* Postgres tint (sky/cyan) */
      .ed-pill-pg rect {
        fill: rgba(56, 189, 248, 0.08);
        stroke: rgba(56, 189, 248, 0.3);
      }
      .ed-pill-pg .ed-icon { stroke: #7dd3fc; }
      .ed-pill-pg .ed-label { fill: #bae6fd; }

      /* SQLite tint (teal) */
      .ed-pill-sqlite rect {
        fill: rgba(45, 212, 191, 0.08);
        stroke: rgba(45, 212, 191, 0.3);
      }
      .ed-pill-sqlite .ed-icon { stroke: #5eead4; }
      .ed-pill-sqlite .ed-label { fill: #99f6e4; }

      /* Surface tints — match feature-card icon colors */
      .ed-pill-mcp rect {
        fill: rgba(99, 102, 241, 0.12);
        stroke: rgba(99, 102, 241, 0.35);
      }
      .ed-pill-mcp .ed-icon { stroke: #a5b4fc; }
      .ed-pill-mcp .ed-label { fill: #c7d2fe; }

      .ed-pill-rest rect {
        fill: rgba(139, 92, 246, 0.12);
        stroke: rgba(139, 92, 246, 0.35);
      }
      .ed-pill-rest .ed-icon { stroke: #c4b5fd; }
      .ed-pill-rest .ed-label { fill: #ddd6fe; }

      .ed-pill-openapi rect {
        fill: rgba(16, 185, 129, 0.1);
        stroke: rgba(16, 185, 129, 0.35);
      }
      .ed-pill-openapi .ed-icon { stroke: #6ee7b7; }
      .ed-pill-openapi .ed-label { fill: #a7f3d0; }

      /* Engine */
      .ed-engine-rect {
        fill: rgba(99, 102, 241, 0.08);
        stroke: rgba(99, 102, 241, 0.5);
        stroke-width: 1.5;
        animation: ed-engine-pulse 4s linear infinite;
      }

      .ed-engine-title {
        text-anchor: middle;
        dominant-baseline: middle;
        font-size: 19px;
        font-weight: 700;
        fill: #f8fafc;
        letter-spacing: -0.01em;
      }

      .ed-engine-sub {
        text-anchor: middle;
        dominant-baseline: middle;
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        fill: #94a3b8;
      }

      /* Animated dots */
      .ed-dot {
        fill: #ffffff;
        filter: drop-shadow(0 0 6px rgba(165, 180, 252, 0.9));
        offset-rotate: 0deg;
        opacity: 0;
      }

      .ed-dot-pg {
        offset-path: path('M 200 104 C 245 104 270 165 300 175');
        animation: ed-flow-req-a 4s linear infinite;
      }
      .ed-dot-sqlite {
        offset-path: path('M 200 256 C 245 256 270 195 300 185');
        animation: ed-flow-req-b 4s linear infinite;
      }
      .ed-dot-mcp {
        offset-path: path('M 500 165 C 540 165 565 86 600 86');
        animation: ed-flow-resp-mcp 4s linear infinite;
      }
      .ed-dot-rest {
        offset-path: path('M 500 180 L 600 180');
        animation: ed-flow-resp-rest 4s linear infinite;
      }
      .ed-dot-openapi {
        offset-path: path('M 500 195 C 540 195 565 274 600 274');
        animation: ed-flow-resp-openapi 4s linear infinite;
      }

      /* Single 4s cycle:
         0–25% : request from Postgres
         12–37%: request from SQLite (staggered)
         40–67%: response to MCP
         50–77%: response to REST
         60–87%: response to OpenAPI                                */
      @keyframes ed-flow-req-a {
        0%   { offset-distance: 0%;   opacity: 0; }
        3%   { offset-distance: 12%;  opacity: 1; }
        22%  { offset-distance: 100%; opacity: 1; }
        25%  { offset-distance: 100%; opacity: 0; }
        100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes ed-flow-req-b {
        0%, 12%   { offset-distance: 0%;   opacity: 0; }
        15%       { offset-distance: 12%;  opacity: 1; }
        34%       { offset-distance: 100%; opacity: 1; }
        37%, 100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes ed-flow-resp-mcp {
        0%, 40%   { offset-distance: 0%;   opacity: 0; }
        43%       { offset-distance: 8%;   opacity: 1; }
        64%       { offset-distance: 100%; opacity: 1; }
        67%, 100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes ed-flow-resp-rest {
        0%, 50%   { offset-distance: 0%;   opacity: 0; }
        53%       { offset-distance: 8%;   opacity: 1; }
        74%       { offset-distance: 100%; opacity: 1; }
        77%, 100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes ed-flow-resp-openapi {
        0%, 60%   { offset-distance: 0%;   opacity: 0; }
        63%       { offset-distance: 8%;   opacity: 1; }
        84%       { offset-distance: 100%; opacity: 1; }
        87%, 100% { offset-distance: 100%; opacity: 0; }
      }

      /* Engine pulses around the moment request dots arrive (25–38% of cycle) */
      @keyframes ed-engine-pulse {
        0%, 22%, 45%, 100% {
          filter: drop-shadow(0 0 0 transparent);
          stroke: rgba(99, 102, 241, 0.5);
        }
        28% {
          filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.55));
          stroke: rgba(165, 180, 252, 0.85);
        }
        37% {
          filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.55));
          stroke: rgba(165, 180, 252, 0.85);
        }
      }

      /* Respect motion preferences: park each dot mid-path, freeze the engine. */
      @media (prefers-reduced-motion: reduce) {
        .ed-dot,
        .ed-engine-rect {
          animation: none;
        }
        .ed-dot {
          opacity: 0.85;
          offset-distance: 50%;
        }
      }
    </style>
  </defs>

  <!-- Connection lines (decorative; dots ride on top) -->
  <g class="ed-lines" aria-hidden="true" fill="none" stroke="url(#ed-line)" stroke-width="1.6" stroke-linecap="round">
    <path d="M 200 104 C 245 104 270 165 300 175" />
    <path d="M 200 256 C 245 256 270 195 300 185" />
    <path d="M 500 165 C 540 165 565 86 600 86" />
    <path d="M 500 180 L 600 180" />
    <path d="M 500 195 C 540 195 565 274 600 274" />
  </g>

  <!-- Animated request/response dots -->
  <g class="ed-dots" aria-hidden="true">
    <circle r="4.5" class="ed-dot ed-dot-pg" />
    <circle r="4.5" class="ed-dot ed-dot-sqlite" />
    <circle r="4.5" class="ed-dot ed-dot-mcp" />
    <circle r="4.5" class="ed-dot ed-dot-rest" />
    <circle r="4.5" class="ed-dot ed-dot-openapi" />
  </g>

  <!-- Source: Postgres -->
  <g class="ed-pill ed-pill-pg" transform="translate(40 70)">
    <rect width="160" height="68" rx="14" />
    <g transform="translate(20 18)" class="ed-icon" aria-hidden="true">
      <ellipse cx="14" cy="6" rx="11" ry="4" />
      <path d="M3 6v20c0 2.2 4.9 4 11 4s11-1.8 11-4V6" />
      <path d="M3 14c0 2.2 4.9 4 11 4s11-1.8 11-4" />
      <path d="M3 22c0 2.2 4.9 4 11 4s11-1.8 11-4" />
    </g>
    <text x="60" y="42" class="ed-label">Postgres</text>
  </g>

  <!-- Source: SQLite -->
  <g class="ed-pill ed-pill-sqlite" transform="translate(40 222)">
    <rect width="160" height="68" rx="14" />
    <g transform="translate(20 18)" class="ed-icon" aria-hidden="true">
      <ellipse cx="14" cy="6" rx="11" ry="4" />
      <path d="M3 6v20c0 2.2 4.9 4 11 4s11-1.8 11-4V6" />
      <path d="M3 14c0 2.2 4.9 4 11 4s11-1.8 11-4" />
      <path d="M3 22c0 2.2 4.9 4 11 4s11-1.8 11-4" />
    </g>
    <text x="60" y="42" class="ed-label">SQLite</text>
  </g>

  <!-- Engine -->
  <g class="ed-engine" transform="translate(300 130)">
    <rect class="ed-engine-rect" width="200" height="100" rx="16" />
    <text x="100" y="42" class="ed-engine-title">pgvis engine</text>
    <text x="100" y="70" class="ed-engine-sub">parse → plan → SQL</text>
  </g>

  <!-- Surface: MCP -->
  <g class="ed-pill ed-pill-mcp" transform="translate(600 60)">
    <rect width="160" height="52" rx="12" />
    <g transform="translate(18 14)" class="ed-icon" aria-hidden="true">
      <path d="M12 0a4 4 0 0 0-4 4v1a4 4 0 0 0-4 4v1a4 4 0 0 0 4 4v1a4 4 0 0 0 4 4 4 4 0 0 0 4-4v-1a4 4 0 0 0 4-4v-1a4 4 0 0 0-4-4V4a4 4 0 0 0-4-4z" />
      <path d="M12 6v12M6 12h12" />
    </g>
    <text x="56" y="34" class="ed-label">MCP</text>
  </g>

  <!-- Surface: REST -->
  <g class="ed-pill ed-pill-rest" transform="translate(600 154)">
    <rect width="160" height="52" rx="12" />
    <g transform="translate(18 14)" class="ed-icon" aria-hidden="true">
      <path d="M2 6h20M2 12h20M2 18h12" />
      <circle cx="20" cy="18" r="2.5" />
    </g>
    <text x="56" y="34" class="ed-label">REST</text>
  </g>

  <!-- Surface: OpenAPI -->
  <g class="ed-pill ed-pill-openapi" transform="translate(600 248)">
    <rect width="160" height="52" rx="12" />
    <g transform="translate(18 14)" class="ed-icon" aria-hidden="true">
      <path d="M14 0H4a2 2 0 0 0-2 2v20a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6z" />
      <path d="M14 0v6h6M8 12h6M8 16h4" />
    </g>
    <text x="56" y="34" class="ed-label">OpenAPI</text>
  </g>
</svg>
